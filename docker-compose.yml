services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - har_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Only exposed on loopback for local dev. Remove the ports section
    # entirely on a shared server unless you really need direct DB access.
    ports:
      - "127.0.0.1:5432:5432"

  api:
    build: .
    restart: unless-stopped
    environment:
      HAR_API_KEY: ${HAR_API_KEY}
      HAR_MAX_UPLOAD_BYTES: ${HAR_MAX_UPLOAD_BYTES:-52428800}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${HAR_API_PORT:-8000}:8000"

volumes:
  har_pgdata:
